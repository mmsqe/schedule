<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Maker</title>
    <!-- LZ-String compression for shorter URLs -->
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="main-area">
            <div class="header">
                <h1>Schedule Maker</h1>
                <div class="view-toggle">
                    <button class="active" data-view="weekly">Weekly</button>
                    <button data-view="daily">Daily</button>
                    <button data-view="monthly">Monthly</button>
                </div>
                <!-- buttons generated by buildControls() in app.js -->
                <div class="day-selector" id="daySelectorDaily" style="display: none;"></div>
                <div class="day-selector" id="weekSelector" style="display: none; align-items: center;">
                    <button class="day-btn" id="prevWeek" title="Previous week">&lsaquo;</button>
                    <span id="weekLabel" style="min-width: 150px; text-align: center; font-weight: 600; color: #2c3e50; cursor: pointer;" title="Jump to current week"></span>
                    <button class="day-btn" id="nextWeek" title="Next week">&rsaquo;</button>
                </div>
                <div class="day-selector" id="monthSelector" style="display: none; align-items: center;">
                    <button class="day-btn" id="prevMonth" title="Previous month">&lsaquo;</button>
                    <span id="monthLabel" style="min-width: 150px; text-align: center; font-weight: 600; color: #2c3e50;"></span>
                    <button class="day-btn" id="nextMonth" title="Next month">&rsaquo;</button>
                </div>
            </div>

            <div class="calendar-wrapper">
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>

        <div class="sidebar">
            <button class="sidebar-btn primary" id="addBtn" title="Add Event">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>Add</span>
            </button>

            <div class="sidebar-divider"></div>

            <button class="sidebar-btn" id="themeBtn" title="Theme (Auto / Day / Night)">
                <span id="themeIcon" style="display:flex;align-items:center;justify-content:center;width:20px;height:20px;"></span>
                <span id="themeLabel">Auto</span>
            </button>

            <button class="sidebar-btn" id="settingsBtn" title="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span>Settings</span>
            </button>

            <button class="sidebar-btn" id="shareBtn" title="Share">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
                <span>Share</span>
            </button>

            <button class="sidebar-btn" id="syncBtn" title="Sync">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/>
                </svg>
                <span>Sync</span>
            </button>

            <button class="sidebar-btn" id="exportBtn" title="Export">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span>Export</span>
            </button>

            <button class="sidebar-btn" id="resetBtn" title="Reset">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                </svg>
                <span>Reset</span>
            </button>
        </div>
    </div>

    <!-- Event Modal -->
    <div class="modal-overlay" id="eventModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add Event</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Event Title</label>
                    <input type="text" id="eventTitle" placeholder="e.g., School, Basketball">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="eventLocation" placeholder="e.g., Home, ESF School">
                </div>
                <div class="form-group">
                    <label>Day</label>
                    <!-- options generated by buildControls() in app.js -->
                    <select id="eventDay"></select>
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <div class="time-inputs">
                        <input type="time" id="eventStart" value="09:00">
                        <input type="time" id="eventEnd" value="10:00">
                    </div>
                </div>
                <div class="form-group">
                    <label>Date Range <span style="font-weight:400; color:#999; font-size:0.8rem;">(optional — leave empty to repeat every week)</span></label>
                    <div class="time-inputs">
                        <div>
                            <label style="font-size: 0.8rem; color: #888;">From</label>
                            <input type="date" id="eventStartDate">
                        </div>
                        <div>
                            <label style="font-size: 0.8rem; color: #888;">Until</label>
                            <input type="date" id="eventEndDate">
                        </div>
                    </div>
                </div>
                <div class="form-group" id="skipGroup" style="display:none;">
                    <label>Skip specific dates <span style="font-weight:400; color:#999; font-size:0.8rem;">(hide just this occurrence — the event still repeats otherwise)</span></label>
                    <div id="skipChips" class="skip-chips"></div>
                    <button type="button" class="btn btn-secondary" id="skipThisDate" style="display:none; margin-top:8px; font-size:0.85rem;"></button>
                </div>
                <div class="form-group">
                    <label>Color</label>
                    <!-- swatches generated by buildControls() in app.js -->
                    <div class="color-picker-grid" id="colorPicker"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="deleteEvent" style="display: none;">Delete</button>
                <button class="btn btn-secondary" id="copyEvent" style="display: none;">Copy</button>
                <button class="btn btn-secondary" id="pasteEvent" style="display: none;">Paste</button>
                <div style="flex: 1;"></div>
                <button class="btn btn-secondary" id="cancelEvent">Cancel</button>
                <button class="btn btn-primary" id="saveEvent">Save</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="modal-close" onclick="closeSettingsModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-group">
                    <h3>Schedule Title</h3>
                    <input type="text" id="scheduleTitle" placeholder="Schedule Maker" style="margin-top: 5px;">
                </div>
                <div class="settings-group">
                    <h3>Time Range</h3>
                    <div class="time-inputs">
                        <div>
                            <label style="font-size: 0.8rem; color: #888;">Start Hour</label>
                            <select id="startHour" style="margin-top: 5px;">
                                <option value="5">5 AM</option>
                                <option value="6">6 AM</option>
                                <option value="7" selected>7 AM</option>
                                <option value="8">8 AM</option>
                                <option value="9">9 AM</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 0.8rem; color: #888;">End Hour</label>
                            <select id="endHour" style="margin-top: 5px;">
                                <option value="18">6 PM</option>
                                <option value="19">7 PM</option>
                                <option value="20">8 PM</option>
                                <option value="21">9 PM</option>
                                <option value="22">10 PM</option>
                                <option value="23" selected>11 PM</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="settings-group">
                    <h3>Display</h3>
                    <div class="settings-row">
                        <label>Show Weekends</label>
                        <input type="checkbox" id="showWeekends" checked>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="applySettings()">Apply</button>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div class="modal-overlay" id="exportModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Export Schedule</h2>
                <button class="modal-close" onclick="closeExportModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="export-row">
                    <button class="btn btn-secondary" onclick="exportSchedule('csv')">
                        CSV
                    </button>
                    <button class="btn btn-secondary" onclick="exportSchedule('json')">
                        JSON
                    </button>
                    <button class="btn btn-secondary" onclick="exportSchedule('md')">
                        Markdown
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Share Schedule</h2>
                <button class="modal-close" onclick="closeShareModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label style="color: #2e7d32; font-weight: 600;">Edit Access (can modify)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="shareUrlEdit" readonly style="flex: 1; font-size: 0.85rem;">
                        <button class="btn btn-primary" onclick="copyShareUrl('edit')">Copy</button>
                    </div>
                </div>
                <div class="form-group">
                    <label style="color: #1976d2; font-weight: 600;">View Only (read-only)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="shareUrlView" readonly style="flex: 1; font-size: 0.85rem;">
                        <button class="btn btn-secondary" onclick="copyShareUrl('view')">Copy</button>
                    </div>
                </div>
                <p id="copyStatus" style="margin-top: 10px; color: #27ae60; font-size: 0.85rem; display: none;">Link copied to clipboard!</p>
            </div>
        </div>
    </div>

    <!-- Sync Modal -->
    <div class="modal-overlay" id="syncModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Family Sync</h2>
                <button class="modal-close" onclick="closeSyncModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="syncStatus" style="margin-bottom: 20px; padding: 12px; border-radius: 8px; background: #f5f5f5;">
                    <span id="syncStatusText">Not synced</span>
                </div>

                <div class="form-group">
                    <label>Sync Room Code</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="syncRoomId" placeholder="Enter code or create new">
                        <button class="btn btn-primary" onclick="joinSyncRoom()">Join</button>
                    </div>
                </div>

                <div style="text-align: center; margin: 20px 0; color: #999;">or</div>

                <button class="btn btn-secondary" style="width: 100%;" onclick="createSyncRoom()">Create New Room</button>

                <div id="syncRoomInfo" style="display: none; margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 8px;">
                    <p style="margin-bottom: 10px; font-weight: 600; color: #2e7d32;">Room Active!</p>
                    <p style="font-size: 0.9rem; color: #666;">Share this code with family:</p>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="text" id="syncRoomCode" readonly style="flex: 1; font-weight: 600; text-align: center; font-size: 1.1rem;">
                        <button class="btn btn-secondary" onclick="copySyncCode()">Copy</button>
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <button class="btn btn-danger" id="disconnectSync" style="width: 100%; display: none;" onclick="disconnectSync()">Disconnect</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
